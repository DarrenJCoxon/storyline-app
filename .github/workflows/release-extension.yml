name: Release Extension Only

# CB-08: extension-only releases. Push a tag matching `extension-v*`
# (e.g. `extension-v0.3.0`) to trigger this workflow. Builds and
# publishes just the VSIX — no DMG, no MSI, no Tauri build.
#
# The release is marked `prerelease: true` so it doesn't override the
# repository's "latest" pointer (which the homepage uses to find the
# DMG). The installer's CB-07 download path walks ALL releases via the
# GitHub API, so it picks up the new VSIX from this prerelease too.
#
# Use this for typo fixes, renderer bugs, prompt tweaks, etc. — any
# change that doesn't touch the installer Rust code, the marketing
# site, or the Tauri config.
#
# For full releases (installer + extension), keep using the `v*` tag
# scheme which fires .github/workflows/release.yml.

on:
  push:
    tags:
      - 'extension-v*'

permissions:
  contents: write

jobs:
  build-and-release-vsix:
    name: Build and publish VSIX
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - run: npm ci
      # @storyline/core is a file: dep — npm symlinks it into extension/node_modules
      # but doesn't install its own deps (fs-extra, @types/fs-extra). Without
      # this, packages/core/dist/*.js fails at require('fs-extra') as soon as
      # the test runner imports anything from @storyline/core.
      - name: Install workspace package deps
        working-directory: packages/core
        run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:dist
      - run: npx vsce package -o storyline.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: storyline-vsix
          path: extension/storyline.vsix

      # Publish the release. prerelease:true keeps the DMG-serving
      # /releases/latest pointer pinned to the most recent full v*
      # release. The installer's GitHub-API walk finds VSIXs from
      # both prerelease and stable tags, so it picks this up.
      - name: Create GitHub Release (prerelease)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Extension ${{ github.ref_name }}'
          body: |
            Extension-only release. The Storyline VS Code extension at
            this version is the latest the installer will fetch on
            new installs and `Storyline: Check for Updates` calls.

            No installer / DMG / MSI changes — existing installer
            users keep their installer. The next time they run
            "Install Storyline" or update the extension, they get
            this VSIX.
          draft: false
          prerelease: true
          files: extension/storyline.vsix
