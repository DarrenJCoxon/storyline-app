name: Release Extension Only

# CB-08: extension-only releases. Push a tag matching `extension-v*`
# (e.g. `extension-v0.3.0`) to trigger this workflow. Builds and
# publishes just the VSIX — no DMG, no MSI, no Tauri build.
#
# Originally these releases were marked `prerelease: true` so they
# wouldn't override the repository's "Latest" pointer. That backfired:
# GitHub's /releases API groups non-prereleases above prereleases, so
# the installer's walk-and-pick-first VSIX logic silently kept finding
# the older non-prerelease v* VSIX even when a newer extension-v*
# prerelease existed. Releases now ship as non-prereleases, getDownloads.ts
# walks past releases without installer assets to find the most recent
# one with DMG/MSI for the homepage, and the auto-updater + installer
# both sort by published_at desc explicitly.
#
# Use this for typo fixes, renderer bugs, prompt tweaks, etc. — any
# change that doesn't touch the installer Rust code, the marketing
# site, or the Tauri config.
#
# For full releases (installer + extension with new DMG/MSI), keep
# using the `v*` tag scheme which fires .github/workflows/release.yml.

on:
  push:
    tags:
      - 'extension-v*'

permissions:
  contents: write

jobs:
  build-and-release-vsix:
    name: Build and publish VSIX
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - run: npm ci
      # @storyline/core is a file: dep — npm symlinks it into extension/node_modules
      # but doesn't install its own deps (fs-extra, @types/fs-extra). Without
      # this, packages/core/dist/*.js fails at require('fs-extra') as soon as
      # the test runner imports anything from @storyline/core.
      - name: Install @storyline/core deps
        working-directory: packages/core
        run: npm ci
      # packages/runtime imports puppeteer + @lesjoursfr/html-to-epub which are
      # declared at the repo root (heavy native/native-ish modules used by the
      # compile pipeline). esbuild walks up from packages/runtime/compile/ and
      # finds them in root/node_modules locally — but CI starts with an empty
      # root/node_modules, so `npm run build:dist` errors with "Could not
      # resolve 'puppeteer'". Install root deps to populate root/node_modules.
      - name: Install root deps for runtime package resolution
        working-directory: .
        run: npm ci --ignore-scripts
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:dist
      - run: npx vsce package -o storyline.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: storyline-vsix
          path: extension/storyline.vsix

      # Publish as non-prerelease so the GitHub "Latest" badge reflects
      # the actual most-recent release. getDownloads.ts walks past
      # VSIX-only releases to find the most recent one with installer
      # DMG/MSI for the homepage; the in-extension auto-updater and
      # installer's download_latest_vsix both sort by published_at desc
      # explicitly so they find this release first.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Extension ${{ github.ref_name }}'
          body: |
            Extension-only release. The Storyline VS Code extension at
            this version is the latest the installer will fetch on
            new installs and `Storyline: Check for Updates` calls.

            No installer / DMG / MSI changes — existing installer
            users keep their installer. The next time they run
            "Install Storyline" or update the extension, they get
            this VSIX.
          draft: false
          prerelease: false
          files: extension/storyline.vsix
