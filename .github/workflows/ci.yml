name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    name: "@storyline/core — typecheck + test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/core/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  extension:
    name: "extension — typecheck + test + package"
    runs-on: ubuntu-latest
    needs: core
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Extension package build
        run: npx vsce package --no-dependencies
        continue-on-error: true   # packaging needs the VS Code runtime; treated as advisory in CI

  backend:
    name: "backend — typecheck + test + wrangler dry-run"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Wrangler build dry-run
        run: npx wrangler deploy --dry-run --outdir dist

  root:
    name: "root — test suite"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm test
