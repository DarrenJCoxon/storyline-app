name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    name: "@storyline/core — typecheck + test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/core/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  extension:
    name: "extension — typecheck + test + package"
    runs-on: ubuntu-latest
    needs: core
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      # @storyline/core is a file: dep — npm symlinks it into extension/node_modules
      # but doesn't install its own deps (fs-extra, @types/fs-extra). Without
      # this, packages/core/dist/*.js fails at require('fs-extra') as soon as
      # the test runner imports anything from @storyline/core. Mirrors the
      # fix in release-extension.yml.
      - name: Install @storyline/core deps
        working-directory: packages/core
        run: npm ci
      # packages/runtime imports puppeteer + @lesjoursfr/html-to-epub which are
      # declared at the repo root (used by packages/runtime/compile/*).
      # esbuild walks up from packages/runtime/compile/ and finds them in
      # root/node_modules locally — but CI starts with an empty root/node_modules,
      # so vsce package errors with "Could not resolve 'puppeteer'".
      - name: Install root deps for runtime package resolution
        working-directory: .
        run: npm ci --ignore-scripts
      - run: npm run typecheck
      - run: npm test
      - name: Extension package build
        run: npx vsce package --no-dependencies
        continue-on-error: true   # packaging needs the VS Code runtime; treated as advisory in CI

  backend:
    name: "backend — typecheck + test + wrangler dry-run"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Wrangler build dry-run
        run: npx wrangler deploy --dry-run --outdir dist

  root:
    name: "root — test suite"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm test

  installer-version-guard:
    name: "guard — installer version matches homepage download links"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Pure node script, no deps — fails the build if installer/src-tauri/
      # tauri.conf.json's version drifts from the asset filenames hard-coded
      # in site/app/DownloadCard.tsx. Mismatch silently 404s every download
      # button on the homepage.
      - run: node scripts/check-installer-version.mjs
