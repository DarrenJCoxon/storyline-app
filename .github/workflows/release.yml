name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-vsix:
    name: Build VSIX
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - run: npm run build:dist
      # vsce package WITHOUT --no-dependencies so it includes node_modules.
      # .vscodeignore excludes node_modules/** by default and whitelists the
      # specific packages lib/ dynamic-imports at runtime (fs-extra, chalk,
      # markdown-it, sharp, @img/*, etc). Previous --no-dependencies skipped
      # node_modules entirely, breaking the live preview on fresh installs
      # with ERR_MODULE_NOT_FOUND on fs-extra.
      #
      # @storyline/core is in devDependencies (bundled into dist/extension.js
      # by esbuild), so vsce's `npm list --production` doesn't trip over its
      # workspace file: link.
      - run: npx vsce package -o storyline.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: storyline-vsix
          path: extension/storyline.vsix

  create-release:
    name: Create GitHub Release
    needs: build-vsix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Idempotent: if the release for this tag already exists (e.g. a
      # previous failed run), softprops updates it instead of erroring.
      # Pre-creating the release here removes the race where two matrix
      # jobs (silicon + intel) both try to create it simultaneously and
      # the loser fails with "already_exists" (this is what dropped the
      # aarch64 DMG from v0.1.30).
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Storyline ${{ github.ref_name }}'
          body: 'Download the Storyline installer below.'
          draft: false
          prerelease: false
          generate_release_notes: true

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    needs: [build-vsix, create-release]
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - args: '--target aarch64-apple-darwin'
            arch: silicon
          - args: '--target x86_64-apple-darwin'
            arch: intel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: storyline-vsix
          path: installer/src-tauri/resources/

      - name: Install Rust targets
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Install frontend deps
        working-directory: installer
        run: npm ci

      - name: Import Apple Developer Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | tr -d ' \r\n' | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Build, sign and notarise
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: 'Developer ID Application: Darren Coxon (2J8K99KZC6)'
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: '2J8K99KZC6'
        with:
          projectPath: installer
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: 'Storyline ${{ github.ref_name }}'
          releaseBody: 'Download the Storyline installer below.'
          releaseDraft: false
          prerelease: false

  build-windows:
    name: Build Windows
    needs: [build-vsix, create-release]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: storyline-vsix
          path: installer/src-tauri/resources/

      - name: Install frontend deps
        working-directory: installer
        run: npm ci

      - name: Build (unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: installer
          args: '--target x86_64-pc-windows-msvc'
          tagName: ${{ github.ref_name }}
          releaseName: 'Storyline ${{ github.ref_name }}'
          releaseBody: 'Download the Storyline installer below.'
          releaseDraft: false
          prerelease: false

  upload-vsix:
    name: Attach VSIX to Release
    needs: [build-macos, build-vsix, create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: storyline-vsix
          path: .

      - name: Upload VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: storyline.vsix
          # draft: false means each pushed tag publishes immediately and
          # appears at github.com/.../releases. Earlier drafts can still
          # be edited; this only affects future tag pushes.
          draft: false
          generate_release_notes: true
